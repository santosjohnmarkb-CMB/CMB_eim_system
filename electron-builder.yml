appId: com.cmb.eim
productName: CMB EIM System
copyright: Copyright © 2026 CMB Film Services, Inc.

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-main/**/*
  - package.json

extraResources:
  - from: database
    to: database
    filter:
      - "**/*"
  - from: resources
    to: resources
    filter:
      - "**/*"

asar: true
asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**"
  - "**/pdfkit/**"

mac:
  category: public.app-category.business
  icon: build/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  # Hardened-runtime entitlements required for notarization (JIT + native modules).
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Signing identity is auto-selected from the keychain, or supply CSC_LINK /
  # CSC_KEY_PASSWORD env vars in CI. Notarization is handled by the afterSign
  # hook (build/notarize.cjs), so disable electron-builder's built-in notarize
  # to avoid double submission.
  notarize: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

win:
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  category: Office
  target:
    - AppImage

artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

# Runs after code signing on macOS; notarizes only when Apple credentials are
# present in the environment (see build/notarize.cjs). Harmless on other OSes.
afterSign: build/notarize.cjs
