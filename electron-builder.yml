appId: com.cmb.eim
productName: CMB EIM System
copyright: Copyright © 2026 CMB Film Services, Inc.

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-main/**/*
  - package.json

extraResources:
  - from: database
    to: database
    filter:
      - "**/*"

asar: true
asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**"
  - "**/pdfkit/**"

mac:
  category: public.app-category.business
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  category: Office
  target:
    - AppImage

artifactName: "${productName}-${version}-${os}-${arch}.${ext}"
